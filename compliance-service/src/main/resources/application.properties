# This is the ONLY properties file needed in compliance-service.
# All real config (port, DB URL, JWT, JPA) comes from GitHub config repo.
# GitHub repo: https://github.com/Bharat613/justiceserve-config

spring.application.name=compliance-service
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.uri=http://localhost:8888
spring.cloud.config.fail-fast=false

# Eureka registration (needed early before config loads)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
